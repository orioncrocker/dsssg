<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title with fallback to site title -->
    <title>{% block title %}{{ site.site_title }}{% endblock %}</title>

    <!-- Dynamic meta description -->
    <meta name="description" content="{% block description %}{{ site.site_description }}{% endblock %}">

    <!-- Additional meta tags -->
    <meta name="author" content="{{ site.author|default('Site Author') }}">

    <!-- Open Graph tags for social sharing -->
    <meta property="og:title" content="{% block og_title %}{{ site.site_title }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ site.site_description }}{% endblock %}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:url" content="{% block og_url %}{{ site.site_url }}{% endblock %}">
    {% block og_image %}{% endblock %}

    <!-- CSS and other assets -->
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">{{ site.site_title }}</a></h1>
            <nav>
                <a href="/">Posts</a>
                <a href="/tags.html">Tags</a>
                {% for page in nav_pages %}
                <a href="{{ page.url }}">{{ page.title }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; {{ now.year }} {{ site.author|default(site.site_title) }}. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
